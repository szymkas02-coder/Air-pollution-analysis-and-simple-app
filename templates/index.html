{% extends "base.html" %}

{% block title %}Mapa zanieczyszczeń{% endblock %}

{% block content %}
<h1>Mapa zanieczyszczeń powietrza</h1>

<!-- Formularz wyboru zanieczyszczenia (POST) -->
<form method="POST">
    <label for="pollutant">Wybierz typ zanieczyszczenia:</label>
    <select name="pollutant" id="pollutant" onchange="this.form.submit()">
        {% for option in options %}
            <option value="{{ option }}" {% if option == selected %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
    </select>
</form>

<!-- Wyświetlenie mapy -->
<iframe src="{{ url_for('static', filename='maps/' + map_file) }}"
        width="100%" height="600px" style="border:none;"></iframe>

<!-- Wybór stacji do wykresu -->
{% if stations %}
<hr>
<h2>Wykres danych czasowych</h2>
<form method="GET" action="{{ url_for('plot') }}">
    <input type="hidden" name="pollutant" value="{{ selected }}">

    <label for="station">Wybierz stację:</label>
    <select name="station" id="station">
        {% for s in stations %}
            <option value="{{ s }}" {% if s == selected_station %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
    </select>

    <button type="submit">Pokaż wykres</button>
</form>
{% endif %}
{% endblock %}
